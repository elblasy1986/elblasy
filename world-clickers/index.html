<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Clickers</title>
    <meta name="description"
        content="World Clickers is a global idle clicker game where players mine resources, compete for their countries, unlock the Moon, and become legendary astronauts seen by players worldwide.">
    <meta name="keywords"
        content="world clickers, idle game, clicker game, mining game, country leaderboard game, moon mining game, browser game">
    <meta name="author" content="World Clickers">
    <!-- Search Engine -->
    <meta name="robots" content="index, follow">
    <!-- Open Graph (Social Sharing) -->
    <meta property="og:title" content="World Clickers – Global Idle Mining Game by Country">
    <meta property="og:description"
        content="Mine resources, compete for your country, unlock the Moon, and become a legendary astronaut in World Clickers.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://worldclickers.com">
    <meta property="og:image" content="https://worldclickers.com/open_graph_image.jpg">
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="World Clickers – Global Idle Mining Game by Country">
    <meta name="twitter:description"
        content="A global idle clicker game where countries compete and astronauts make history.">
    <meta name="twitter:image" content="https://worldclickers.com/open_graph_image.jpg">
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Roboto:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">
</head>

<body>
    <!-- Dynamic Star Background Removed -->
    <div class="clouds-container"></div>

    <!-- Loading Overlay -->
    <div id="loading-overlay">
        <div class="loading-content">
            <img src="world_clickers_logo.png" class="loading-logo" alt="World Clickers">
            <div class="loading-bar-container" id="loading-bar-container">
                <div class="loading-bar-fill" id="loading-bar-fill"></div>
            </div>
            <button id="btn-play-game" class="play-button">PLAY</button>
        </div>
    </div>

    <!-- Audio Assets -->
    <audio id="audio-bg-music" loop src="sounds/background_music.ogg"></audio>
    <audio id="audio-click" src="sounds/pop_sound.wav"></audio>
    <audio id="audio-purchase" src="sounds/purchase_sound.wav"></audio>

    <!-- Top Right Controls (Hidden per user request) -->
    <div class="profile-control" style="display: none;">
        <i class="fa-solid fa-music" id="btn-music"></i>
        <i class="fa-solid fa-volume-high" id="btn-audio"></i>
        <i class="fa-solid fa-circle-exclamation" id="btn-help"></i>
        <i class="fa-solid fa-user" id="btn-profile"></i>
    </div>

    <!-- Main Game Wrapper -->
    <div class="game-wrapper">

        <!-- Earth Resources Sidebar (Left) -->
        <aside class="earth-resources-sidebar">
            <div class="resources-icons-column">
                <div class="layout-gap"></div>
                <div class="resource-slot"><img src="resources/diamond.png" alt="Diamond"></div>
                <div class="layout-gap"></div>
                <div class="resource-slot"><img src="resources/gold.png" alt="Gold"></div>
                <div class="layout-gap"></div>
                <div class="resource-slot"><img src="resources/silver.png" alt="Silver"></div>
                <div class="layout-gap"></div>
                <div class="resource-slot"><img src="resources/copper.png" alt="Copper"></div>
                <div class="layout-gap"></div>
                <div class="resource-slot"><img src="resources/iron.png" alt="Iron"></div>
                <div class="layout-gap"></div>
                <div class="resource-slot"><img src="resources/oil.png" alt="Oil"></div>
                <div class="layout-gap"></div>
                <div class="resource-slot"><img src="resources/stone.png" alt="Stone"></div>
                <div class="layout-gap"></div>
                <div class="resource-slot"><img src="resources/coal.png" alt="Coal"></div>
                <div class="layout-gap"></div>
                <div class="resource-slot"><img src="resources/fish.png" alt="Fish"></div>
                <div class="layout-gap"></div>
                <div class="resource-slot"><img src="resources/wood.png" alt="Wood"></div>
                <div class="layout-gap"></div>
            </div>

            <!-- Heat / Progress Bar -->
            <div class="heat-bar-container">
                <div class="heat-bar-fill" id="heat-bar-fill"></div>
            </div>

            <!-- Resource Names -->
            <div class="resources-names-column">
                <div class="layout-gap"></div>
                <div class="resource-slot"><span>Diamond</span></div>
                <div class="layout-gap"></div>
                <div class="resource-slot"><span>Gold</span></div>
                <div class="layout-gap"></div>
                <div class="resource-slot"><span>Silver</span></div>
                <div class="layout-gap"></div>
                <div class="resource-slot"><span>Copper</span></div>
                <div class="layout-gap"></div>
                <div class="resource-slot"><span>Iron</span></div>
                <div class="layout-gap"></div>
                <div class="resource-slot"><span>Oil</span></div>
                <div class="layout-gap"></div>
                <div class="resource-slot"><span>Stone</span></div>
                <div class="layout-gap"></div>
                <div class="resource-slot"><span>Coal</span></div>
                <div class="layout-gap"></div>
                <div class="resource-slot"><span>Fish</span></div>
                <div class="layout-gap"></div>
                <div class="resource-slot"><span>Wood</span></div>
                <div class="layout-gap"></div>
            </div>
        </aside>

        <!-- Main Game Area -->
        <main class="game-stage">

            <!-- Score Header -->
            <header class="game-header">
                <div class="header-content">
                    <div class="top-nav-icons">
                        <i class="fa-solid fa-gear" id="btn-settings"></i>
                        <i class="fa-solid fa-chart-simple" id="btn-stats"></i>
                        <i class="fa-solid fa-flag" id="btn-achievements"></i>
                        <i class="fa-solid fa-circle-info" id="btn-help"></i>
                    </div>
                    <div class="player-score">
                        <span id="player-score-value">0</span>
                    </div>
                </div>
            </header>



            <!-- Anchor Wrapper -->
            <div class="globe-wrapper-anchor">
                <!-- Systems Rotator -->
                <div class="systems-rotator">
                    <!-- EARTH SYSTEM -->
                    <div class="globe-system" id="earth-system">
                        <div class="pulse-wrapper">
                            <!-- Masked Globe -->
                            <div class="globe-mask" id="earth-interact-zone">
                                <div class="layer earth-layer"></div>
                                <div class="layer clouds-layer"></div>
                                <div class="layer shading-layer"></div>
                            </div>

                            <!-- Earth Glow -->
                            <div class="globe-glow"></div>
                        </div>
                    </div>

                    <!-- MOON SYSTEM (Initially Hidden/Off-screen) -->
                    <div class="globe-system off-screen-right" id="moon-system">
                        <div class="pulse-wrapper">
                            <!-- Masked Globe -->
                            <div class="globe-mask" id="moon-interact-zone">
                                <div class="layer moon-layer"></div>
                                <div class="layer moon-border-layer"></div>
                                <div class="layer shading-layer"></div>
                            </div>

                            <!-- Moon Glow -->
                            <div class="globe-glow moon-glow"></div>
                        </div>
                    </div>
                </div>

                <!-- Moon Travel Button (Static) -->
                <div class="moon-travel-btn" id="btn-travel">
                    <div class="rocket-sprite"></div>
                </div>

            </div>

        </main>

        <!-- Right Side Shop Panel -->
        <aside class="shop-panel">
            <h2 class="shop-title">Tools Shop</h2>
            <div id="shop-list-earth" class="shop-list"></div>
            <div id="shop-list-moon" class="shop-list hidden"></div>
        </aside>
    </div>

    <!-- Mobile Menu Overlay -->
    <div id="mobile-menu-overlay" class="hidden">
        <i class="fa-solid fa-xmark" id="btn-mobile-close"></i>
        <div class="mobile-menu-content">
            <div class="mobile-menu-item" id="btn-mobile-resources">
                <i class="fa-solid fa-cube"></i>
                <span>Resources Guide</span>
            </div>
            <div class="mobile-menu-item" id="btn-mobile-astronauts">
                <i class="fa-solid fa-user-astronaut"></i>
                <span>Astronauts</span>
            </div>
            <div class="mobile-menu-item" id="btn-mobile-leaderboard">
                <i class="fa-solid fa-star"></i>
                <span>Leaderboard</span>
            </div>

            <div class="mobile-menu-footer">
                <i class="fa-solid fa-music" id="btn-mobile-music"></i>
                <i class="fa-solid fa-volume-high" id="btn-mobile-audio"></i>
                <i class="fa-solid fa-circle-exclamation" id="btn-mobile-help"></i>
            </div>
        </div>
    </div>

    <!-- Travel Confirmation Popup -->
    <div id="travel-confirm-overlay" class="hidden">
        <div class="travel-confirm-content">
            <i class="fa-solid fa-xmark" id="btn-travel-close"></i>
            <div class="travel-popup-icon">
                <div class="travel-popup-rocket"></div>
            </div>
            <h2 class="travel-title">Travel to the Moon</h2>
            <p class="travel-desc">Unlock a one-way ticket to explore<br>lunar resources and new tools!</p>
            <p class="travel-cost">Cost: <strong id="travel-cost-value">$50K</strong></p>
            <button class="btn-buy travel-pay-btn" id="btn-pay-travel">UNLOCK THE MOON</button>
        </div>
    </div>

    <!-- Login Confirmation Popup -->
    <div id="login-confirm-overlay"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 500; justify-content: center; align-items: center; background-color: transparent; backdrop-filter: blur(8px);">
        <div class="travel-confirm-content"
            style="position: relative; width: 90%; max-width: 400px; background: rgba(0, 0, 0, 0.9); border-radius: 20px; padding: 40px 30px; display: flex; flex-direction: column; align-items: center; text-align: center; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);">
            <i class="fa-solid fa-xmark" id="btn-login-close"></i>
            <h2 class="travel-title" style="margin-top: 20px; margin-bottom: 40px;">Please login first<br>to buy
                tools!
            </h2>
            <button class="btn-buy" id="btn-go-login"
                style="background-color: #2ecc71; width: 100%; max-width: 200px;">Login</button>
        </div>
    </div>

    <div id="custom-cursor"></div>
    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="script.js"></script>
</body>

</html>
