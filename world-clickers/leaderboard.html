<!DOCTYPE html>
<html lang="en" class="standalone-page">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard – World Clickers</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Roboto:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">
</head>

<body class="standalone-page">
    <a href="index.html" class="back-link">
        <i class="fa-solid fa-arrow-left"></i>
        Back to the Game
    </a>

    <div class="page-wrapper">
        <div class="guide-text">
            <h1 class="guide-title">Local Rankings</h1>

            <div class="guide-tabs">
                <div class="menu-item tab-btn active" id="tab-lb-countries">
                    <i class="fa-solid fa-flag"></i>
                    <span>Countries</span>
                </div>
                <div class="menu-item tab-btn" id="tab-lb-players">
                    <i class="fa-solid fa-user"></i>
                    <span>Miners</span>
                </div>
            </div>

            <div id="list-lb-countries" class="guide-list leaderboard-list"></div>
            <p id="players-intro" class="astronauts-intro hidden" style="margin-top: 15px; margin-bottom: 25px;">
                Your standing among the local mining network.
            </p>
            <div id="list-lb-players" class="guide-list leaderboard-list hidden"></div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        // Static mock data for flavor
        const MOCK_COUNTRIES = [
            { code: 'US', name: 'United States', score: 500000000 },
            { code: 'CN', name: 'China', score: 450000000 },
            { code: 'PS', name: 'Palestine', score: 400000000 },
            { code: 'GB', name: 'United Kingdom', score: 300000000 },
            { code: 'DE', name: 'Germany', score: 250000000 },
            { code: 'EG', name: 'Egypt', score: 200000000 },
            { code: 'CA', name: 'Canada', score: 150000000 },
            { code: 'AU', name: 'Australia', score: 100000000 },
            { code: 'JP', name: 'Japan', score: 80000000 },
            { code: 'BR', name: 'Brazil', score: 50000000 }
        ];

        const MOCK_PLAYERS = [
            { name: 'AlphaMiner', score: 250000000 },
            { name: 'CosmosDigger', score: 180000000 },
            { name: 'StarPioneer', score: 120000000 },
            { name: 'VoidWalker', score: 90000000 },
            { name: 'LunaExpert', score: 60000000 }
        ];

        function renderLeaderboard() {
            const listCountries = document.getElementById('list-lb-countries');
            const listPlayers = document.getElementById('list-lb-players');

            const playerNickname = localStorage.getItem('worldClickerPlayerNickname') || 'You';
            const playerScore = parseInt(localStorage.getItem('worldClickerPlayerScore') || '0', 10);
            const playerCountryCode = localStorage.getItem('worldClickerCountryCode');
            const playerCountryName = localStorage.getItem('worldClickerCountryName');

            // Merge player into mock data
            let countries = [...MOCK_COUNTRIES];
            if (playerCountryCode) {
                const existing = countries.find(c => c.code === playerCountryCode);
                if (existing) {
                    existing.score = Math.max(existing.score, playerScore);
                } else {
                    countries.push({ code: playerCountryCode, name: playerCountryName, score: playerScore });
                }
            }
            countries.sort((a, b) => b.score - a.score);

            let players = [...MOCK_PLAYERS];
            players.push({ name: playerNickname, score: playerScore, isCurrent: true });
            players.sort((a, b) => b.score - a.score);

            // Render Countries
            listCountries.innerHTML = '';
            countries.forEach((country, index) => {
                const entry = document.createElement('div');
                entry.className = 'leaderboard-entry';
                entry.innerHTML = `
                    <div class="leaderboard-item">
                        <span class="lb-rank">${index + 1}.</span>
                        <img class="lb-flag" src="https://hatscripts.github.io/circle-flags/flags/${country.code.toLowerCase()}.svg" alt="${country.name}">
                        <span class="lb-name">
                            <span class="lb-name-full">${country.name}</span>
                        </span>
                        <span class="lb-score">${window.formatShortNumber(country.score)}</span>
                    </div>
                `;
                listCountries.appendChild(entry);
            });

            // Render Players
            listPlayers.innerHTML = '';
            players.forEach((player, index) => {
                const entry = document.createElement('div');
                entry.className = 'leaderboard-entry' + (player.isCurrent ? ' active' : '');

                entry.innerHTML = `
                    <div class="leaderboard-item">
                        <span class="lb-rank">${index + 1}.</span>
                        <span class="lb-name" style="${player.isCurrent ? 'color:#ffd700; font-weight:bold;' : ''}">
                            ${player.name} ${player.isCurrent ? '(You)' : ''}
                        </span>
                        <span class="lb-score">${window.formatShortNumber(player.score)}</span>
                    </div>
                `;
                listPlayers.appendChild(entry);
            });
        }

        // Tab switching
        const tabCountries = document.getElementById('tab-lb-countries');
        const tabPlayers = document.getElementById('tab-lb-players');
        const listCountries = document.getElementById('list-lb-countries');
        const listPlayers = document.getElementById('list-lb-players');

        tabCountries.addEventListener('click', () => {
            tabCountries.classList.add('active');
            tabPlayers.classList.remove('active');
            listCountries.classList.remove('hidden');
            listPlayers.classList.add('hidden');
            document.getElementById('players-intro').classList.add('hidden');
        });

        tabPlayers.addEventListener('click', () => {
            tabPlayers.classList.add('active');
            tabCountries.classList.remove('active');
            listPlayers.classList.remove('hidden');
            listCountries.classList.add('hidden');
            document.getElementById('players-intro').classList.remove('hidden');
        });

        window.addEventListener('DOMContentLoaded', renderLeaderboard);
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
    <div id="custom-cursor"></div>
    <script>
        (function () {
            if (window.matchMedia("(pointer: coarse)").matches) return;
            const cursor = document.getElementById('custom-cursor');
            if (!cursor) return;
            document.addEventListener('mousemove', (e) => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
                const isClickable = e.target.closest('i, button, a, .menu-item, .tab-btn, .mobile-menu-item, .back-link') ||
                    window.getComputedStyle(e.target).cursor === 'pointer';
                cursor.style.transform = isClickable ? "scale(1.1) translateZ(9999px)" : "none translateZ(9999px)";
            });
            document.addEventListener('mouseleave', () => cursor.style.display = 'none');
            document.addEventListener('mouseenter', () => cursor.style.display = 'block');
        })();
    </script>
</body>

</html>
