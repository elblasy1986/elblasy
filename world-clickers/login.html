<!DOCTYPE html>
<html lang="en" class="standalone-page">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Profile – World Clickers</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Roboto:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        .auth-card {
            background: rgba(0, 0, 0, 0.7);
            border: none;
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            margin: 0 auto;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .auth-input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .auth-input-group label {
            display: block;
            margin-bottom: 8px;
            font-family: 'Lilita One', cursive;
            font-size: 0.9em;
            color: #ffd700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .auth-input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            font-family: 'Lilita One', cursive;
            font-size: 1.2em;
            transition: all 0.2s;
            text-align: center;
        }

        .auth-input:focus {
            outline: none;
            border-color: #ffd700;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
        }

        .auth-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            font-family: 'Lilita One', cursive;
            font-size: 1.3em;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
            transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            background-color: #27ae60;
            box-shadow: 0 6px 20px rgba(46, 204, 113, 0.4);
        }

        .auth-btn:active {
            transform: translateY(1px);
        }

        #auth-error {
            color: #ff4a4a;
            font-size: 1em;
            margin-bottom: 20px;
            font-weight: bold;
            font-family: 'Lilita One', cursive;
            min-height: 24px;
        }

        .setup-description {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9em;
            line-height: 1.5;
            margin-bottom: 30px;
        }
    </style>
</head>

<body class="standalone-page">
    <script src="api.js"></script>

    <a href="index.html" class="back-link">
        <i class="fa-solid fa-arrow-left"></i>
        Return to Orbit
    </a>

    <div class="page-wrapper">
        <h1 class="guide-title">Identity Setup</h1>

        <div class="auth-card">
            <p class="setup-description">
                Welcome to the global mining fleet. Choose a nickname to represent you on the leaderboards and save your
                progress locally.
            </p>

            <div id="auth-error"></div>

            <form id="setup-form" onsubmit="handleSetup(event)">
                <div class="auth-input-group">
                    <label>Your Space Callsign</label>
                    <input type="text" id="nickname" class="auth-input" required maxlength="15" placeholder="Nickname"
                        autocomplete="off">
                </div>

                <button type="submit" class="auth-btn">Confirm Identity</button>
            </form>
        </div>
    </div>

    <script>
        async function handleSetup(e) {
            e.preventDefault();
            const errorDiv = document.getElementById('auth-error');
            errorDiv.innerText = '';

            const nickname = document.getElementById('nickname').value.trim();

            if (nickname.length < 3) {
                errorDiv.innerText = 'Nickname must be at least 3 characters.';
                return;
            }

            // In local-only mode, we directly save to localStorage via api.js mocks or manual calls
            const result = await apiPost('/auth/local-setup', { nickname });

            if (result && result.error) {
                errorDiv.innerText = result.error;
            } else if (result && result.token) {
                // Success!
                setToken(result.token);
                setPlayerId(result.player.id);
                setPlayerNickname(result.player.nickname);

                // Check if we have a score from guest play to migrate
                const params = new URLSearchParams(window.location.search);
                const queryScore = params.get('score');
                if (queryScore) {
                    localStorage.setItem('worldClickerPlayerScore', queryScore);
                }

                // Move to country selection
                window.location.href = `nickname.html?score=${queryScore || 0}`;
            } else {
                errorDiv.innerText = 'Initialization failed.';
            }
        }

        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
    <div id="custom-cursor"></div>
    <script>
        (function () {
            if (window.matchMedia("(pointer: coarse)").matches) return;
            const cursor = document.getElementById('custom-cursor');
            if (!cursor) return;
            document.addEventListener('mousemove', (e) => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
                const isClickable = e.target.closest('i, button, a, .menu-item, .tab-btn, .mobile-menu-item, .back-link, canvas') ||
                    window.getComputedStyle(e.target).cursor === 'pointer';
                cursor.style.transform = isClickable ? "scale(1.1) translateZ(9999px)" : "none translateZ(9999px)";
            });
            document.addEventListener('mouseleave', () => cursor.style.display = 'none');
            document.addEventListener('mouseenter', () => cursor.style.display = 'block');
        })();
    </script>
</body>

</html>
